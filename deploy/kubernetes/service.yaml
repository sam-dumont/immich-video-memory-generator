apiVersion: v1
kind: Service
metadata:
  name: immich-memories
  namespace: immich-memories
  labels:
    app.kubernetes.io/name: immich-memories
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: immich-memories
---
# Optional: Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich-memories
  namespace: immich-memories
  labels:
    app.kubernetes.io/name: immich-memories
  annotations:
    # Adjust for your ingress controller
    # nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx  # or traefik, etc.
  rules:
    - host: memories.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immich-memories
                port:
                  name: http
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - memories.example.com
  #     secretName: immich-memories-tls
