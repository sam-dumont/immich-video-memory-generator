name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:  # Allow this workflow to be called from release.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  # Validate commit messages follow conventional commits
  commitlint:
    name: Lint Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Validate commit messages
        run: |
          # Check all commits in the PR
          uvx --from commitizen cz check --rev-range origin/${{ github.base_ref }}..HEAD

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make dev

      - name: Run ruff check
        run: make lint

      - name: Run ruff format check
        run: make format-check

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make dev

      # --- SAST ---
      - name: Bandit (Python security linter)
        run: uvx bandit -r src/ --severity-level medium -f json -o bandit-report.json || true

      - name: Check Bandit results
        run: |
          HIGH=$(python3 -c "import json; r=json.load(open('bandit-report.json')); print(sum(1 for i in r['results'] if i['issue_severity']=='HIGH'))")
          echo "Bandit HIGH severity findings: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            python3 -c "import json; r=json.load(open('bandit-report.json')); [print(f\"  {i['filename']}:{i['line_number']} [{i['test_id']}] {i['issue_text']}\") for i in r['results'] if i['issue_severity']=='HIGH']"
            echo "::warning::Bandit found $HIGH HIGH severity findings - review bandit-report.json"
          fi

      - name: Semgrep (cross-file SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true  # Don't fail CI if Semgrep token not configured

      # --- Dead code & complexity ---
      - name: Vulture (dead code detection)
        run: make dead-code

      - name: Xenon (cyclomatic complexity gate)
        run: make complexity

      - name: Complexipy (cognitive complexity gate)
        run: make cognitive-complexity

      - name: File length gate (max 500 lines)
        run: make file-length

      - name: Refurb (modernization lint)
        run: make refurb

      - name: Deptry (dependency hygiene)
        run: make dep-check

      - name: Interrogate (docstring coverage ≥80%)
        run: make docstring-coverage

      - name: Import-linter (architectural boundaries)
        run: make arch-check

      - name: Code duplication (jscpd ≤5%)
        run: npx jscpd src/ --threshold 5 --min-lines 5 --min-tokens 50 --format python --gitignore

      # --- Dependency & supply chain ---
      - name: pip-audit (dependency vulnerabilities)
        run: uvx pip-audit -r <(uv pip freeze | grep -v -e '^-e ' -e '^immich-memories==') --strict
        shell: bash

      # --- Secret detection ---
      - name: Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Container security ---
      - name: Hadolint (Dockerfile linting)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: error

      - name: Upload Bandit report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make dev

      - name: Run mypy
        run: make typecheck

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install dependencies
        run: make dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src/immich_memories --cov-branch --cov-report=xml -v

      - name: Diff coverage (≥95% on changed lines)
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: uvx diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=95

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Test optional extras install and run on Python 3.13
  test-extras:
    name: Test Extras (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extras: "dev,face,audio,audio-ml,gpu"
          - os: macos-latest
            extras: "dev,mac,audio,audio-ml,face,gpu"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install "3.13"

      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install dependencies with extras
        run: |
          IFS=',' read -ra EXTRAS <<< "${{ matrix.extras }}"
          ARGS=""
          for extra in "${EXTRAS[@]}"; do
            ARGS="$ARGS --extra $extra"
          done
          uv sync $ARGS

      - name: Run tests
        run: make test

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: make build

      - name: Show version
        run: |
          echo "Built version:"
          ls -la dist/
          # Show the version from the built package
          unzip -p dist/*.whl '*/METADATA' | grep '^Version:'

      - name: Check package
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-ci
          path: dist/

  # Build Docker image (no push) to validate Dockerfile on PRs
  docker:
    name: Build Docker Image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Validate docs build (catches broken links, missing images, syntax errors)
  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        run: cd docs-site && npm ci

      - name: Build docs
        run: make docs-check

  # Summary job that other jobs can depend on
  ci-success:
    name: CI Success
    needs: [lint, security, typecheck, test, test-extras, build, docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.test-extras.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.docs.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed!"
