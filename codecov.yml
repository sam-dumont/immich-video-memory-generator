comment: false

codecov:
  max_report_age: off

# Both flags upload fresh on every commit (public CI + GPU runner mirror).
# carryforward OFF — no stale data from different Python versions.
flags:
  unittests:
    paths:
      - src/immich_memories/
    carryforward: false
  integration-linux:
    paths:
      - src/immich_memories/
    carryforward: false

coverage:
  status:
    # WHY: Codecov only sees CI unit tests, not integration coverage XMLs.
    # Real enforcement is via `make diff-cover-ci` which merges all XMLs.
    # Codecov stays informational — uploads for tracking, no blocking.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
