repos:
  # ~0.1s — Formatting + linting (Rust, fast)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ~1s — Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-pyyaml
          - pydantic
          - pydantic-settings
        args: [--ignore-missing-imports]
        pass_filenames: false
        entry: mypy src/

  # ~0.1s — Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # ~0.1s — Conventional commits
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen


  # Modernization patterns (runs via Makefile to use project venv)
  # refurb needs pydantic in venv so can't use the pre-commit repo

  # Local hooks using Makefile targets
  - repo: local
    hooks:
      - id: file-length
        name: File length gate (max 500 lines)
        entry: make file-length
        language: system
        pass_filenames: false
        types: [python]

      - id: complexity
        name: Complexity gate (Xenon grade C)
        entry: make complexity
        language: system
        pass_filenames: false
        types: [python]

      - id: dead-code
        name: Dead code detection (Vulture)
        entry: make dead-code
        language: system
        pass_filenames: false
        types: [python]

      - id: security-lint
        name: Security lint (Bandit)
        entry: make security-lint
        language: system
        pass_filenames: false
        types: [python]

      - id: cognitive-complexity
        name: Cognitive complexity (complexipy with snapshot)
        entry: make cognitive-complexity
        language: system
        pass_filenames: false
        types: [python]

      - id: dep-check
        name: Dependency hygiene (deptry)
        entry: make dep-check
        language: system
        pass_filenames: false
        types: [python]

      - id: docstring-coverage
        name: Docstring coverage (interrogate ≥80%)
        entry: make docstring-coverage
        language: system
        pass_filenames: false
        types: [python]
