name: PR Automation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # Auto-label PRs based on files changed
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    if: github.repository == 'sam-dumont/immich-video-memory-generator' && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml

  # Validate PR title follows conventional commits
  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            should start with a lowercase letter.

  # Add size labels
  size:
    name: PR Size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: 10
          s_label: 'size/S'
          s_max_size: 100
          m_label: 'size/M'
          m_max_size: 500
          l_label: 'size/L'
          l_max_size: 1000
          xl_label: 'size/XL'
          fail_if_xl: false

  # Require approval for breaking changes
  breaking-change-check:
    name: Breaking Change Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Check for breaking changes
        id: check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Check PR title and body for breaking change indicators
          if [[ "$PR_TITLE" == *"!"* ]] || [[ "$PR_BODY" == *"BREAKING CHANGE"* ]]; then
            echo "is_breaking=true" >> $GITHUB_OUTPUT
            echo "This PR contains breaking changes"
          else
            echo "is_breaking=false" >> $GITHUB_OUTPUT
          fi

      - name: Add breaking change label
        if: steps.check.outputs.is_breaking == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['breaking-change', 'needs-maintainer-review']
            })

  # Welcome first-time contributors
  welcome:
    name: Welcome
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/first-interaction@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          pr_message: |
            Thanks for your first contribution to Immich Memories! 🎉

            A maintainer will review your PR soon. In the meantime, please make sure:
            - [ ] Your PR title follows [conventional commits](https://www.conventionalcommits.org/)
            - [ ] You've run `make check` locally
            - [ ] You've added tests for new functionality

            Need help? Check out our [contributing guide](CONTRIBUTING.md).
          issue_message: |
            Thanks for opening your first issue! 🙌

            We'll look into this as soon as possible. If you'd like to help fix this issue,
            feel free to open a PR referencing this issue.
