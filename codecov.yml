comment: false

codecov:
  # WHY: Integration coverage XMLs (tests/*-coverage.xml) are generated locally
  # and committed — their timestamps are stale. CI freshens them before upload,
  # but this disables the server-side check as a safety net.
  max_report_age: off

# Unit tests run in public CI (every commit). Integration tests run on GPU
# runner (triggered by mirror). carryforward keeps integration coverage
# between GPU runs so it's not lost when only unit tests re-upload.
flags:
  unittests:
    paths:
      - src/immich_memories/
    carryforward: false
  integration-linux:
    paths:
      - src/immich_memories/
    carryforward: true

coverage:
  status:
    # WHY: Codecov only sees CI unit tests, not integration coverage XMLs.
    # Real enforcement is via `make diff-cover-ci` which merges all XMLs.
    # Codecov stays informational — uploads for tracking, no blocking.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
