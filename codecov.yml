comment: false

codecov:
  # WHY: Integration coverage XMLs (tests/*-coverage.xml) are generated locally
  # and committed — their timestamps are stale. CI freshens them before upload,
  # but this disables the server-side check as a safety net.
  max_report_age: off

# WHY: All three flags (unittests, integration, integration-linux) are uploaded
# on every CI run — unit tests run fresh, integration XMLs are committed.
# carryforward is OFF so stale data from a different Python version doesn't
# pollute the line count (3.12 vs 3.13 have different coverable lines).
flags:
  unittests:
    paths:
      - src/immich_memories/
    carryforward: false
  integration:
    paths:
      - src/immich_memories/
    carryforward: false
  integration-linux:
    paths:
      - src/immich_memories/
    carryforward: false

coverage:
  status:
    # WHY: Codecov only sees CI unit tests, not integration coverage XMLs.
    # Real enforcement is via `make diff-cover-ci` which merges all XMLs.
    # Codecov stays informational — uploads for tracking, no blocking.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
