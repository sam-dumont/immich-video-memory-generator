comment: false

codecov:
  # WHY: Integration coverage XMLs (tests/*-coverage.xml) are generated locally
  # and committed — their timestamps are stale. CI freshens them before upload,
  # but this disables the server-side check as a safety net.
  max_report_age: off

# WHY: Both unit + integration coverage are generated in CI on Linux 3.12.
# No carryforward needed — both flags are uploaded fresh on every run.
# No platform-specific flags — everything runs on one platform to avoid
# coverable-line mismatches from conditional imports.
flags:
  unittests:
    paths:
      - src/immich_memories/
    carryforward: false
  integration:
    paths:
      - src/immich_memories/
    carryforward: false

coverage:
  status:
    # WHY: Codecov only sees CI unit tests, not integration coverage XMLs.
    # Real enforcement is via `make diff-cover-ci` which merges all XMLs.
    # Codecov stays informational — uploads for tracking, no blocking.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
