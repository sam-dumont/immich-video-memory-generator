name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:  # Allow this workflow to be called from release.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# =============================================================================
# Job ordering: cheap → expensive. All quality gates run in parallel.
# Tests and Docker only run after quality gates pass.
# =============================================================================

jobs:
  # ── Tier 0: Cache setup (shared by all jobs) ──────────────────────────────
  setup:
    name: Setup Cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci

  # ── Tier 1: Cheap quality gates (all parallel, ~10s each) ─────────────────
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uvx --from commitizen cz check --rev-range origin/${{ github.base_ref }}..HEAD

  lint:
    name: Lint + Format
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - name: Ruff check
        run: make lint
      - name: Ruff format check
        run: make format-check

  typecheck:
    name: Type Check (mypy)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make typecheck

  dead-code:
    name: Dead Code (Vulture)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make dead-code

  complexity:
    name: Cyclomatic Complexity (Xenon)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make complexity

  cognitive-complexity:
    name: Cognitive Complexity
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make cognitive-complexity

  file-length:
    name: File Length (≤500 lines)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make file-length

  refurb:
    name: Modernization (refurb)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make refurb

  dep-check:
    name: Dependency Hygiene (deptry)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make dep-check

  docstring-coverage:
    name: Docstring Coverage (≥80%)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make docstring-coverage

  arch-check:
    name: Architecture (import-linter)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make arch-check

  duplication:
    name: Code Duplication (≤5%)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: npx jscpd src/ --threshold 5 --min-lines 5 --min-tokens 50 --format python --gitignore

  critique:
    name: AI Smell Audit
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make critique

  # ── Tier 1: Security (parallel with quality gates) ────────────────────────
  security:
    name: Security Scan
    needs: [setup]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci

      - name: Bandit (Python SAST)
        run: |
          uvx bandit -r src/ --severity-level medium -f json -o bandit-report.json || true
          HIGH=$(python3 -c "import json; r=json.load(open('bandit-report.json')); high=[i for i in r['results'] if i['issue_severity']=='HIGH']; [print(f\"  {i['filename']}:{i['line_number']} [{i['test_id']}] {i['issue_text']}\") for i in high]; exit(len(high))")
          if [ "$?" -ne 0 ]; then
            echo "::error::Bandit found HIGH severity findings"
            exit 1
          fi

      - name: Semgrep (cross-file SAST)
        if: env.SEMGREP_APP_TOKEN != ''
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/python p/owasp-top-ten p/security-audit"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Semgrep (local, no token)
        if: env.SEMGREP_APP_TOKEN == ''
        run: uvx semgrep scan --config auto --config p/python --error --severity ERROR src/
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: pip-audit (dependency CVEs)
        run: uvx pip-audit -r <(uv pip freeze | grep -v -e '^-e ' -e '^immich-memories==') --strict
        shell: bash

      - name: Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: error

      - name: Upload Bandit report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Tier 2: Tests (after all quality gates pass) ──────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: [lint, typecheck, security, dead-code, complexity, cognitive-complexity, file-length, refurb, dep-check, arch-check, duplication, critique]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install ${{ matrix.python-version }}

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - run: make dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src/immich_memories --cov-branch --cov-report=xml -v

      - name: Diff coverage (≥95% on changed lines)
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: uvx diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=95

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  test-extras:
    name: Test Extras (${{ matrix.os }})
    needs: [lint, typecheck, security, dead-code, complexity, cognitive-complexity, file-length, refurb, dep-check, arch-check, duplication, critique]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extras: "dev,face,audio,audio-ml,gpu"
          - os: macos-latest
            extras: "dev,mac,audio,audio-ml,face,gpu"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with: { enable-cache: true }
      - run: uv python install "3.13"

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install with extras
        run: |
          IFS=',' read -ra EXTRAS <<< "${{ matrix.extras }}"
          ARGS=""
          for extra in "${EXTRAS[@]}"; do
            ARGS="$ARGS --extra $extra"
          done
          uv sync $ARGS

      - run: make test

  # ── Tier 3: Build + Docker (most expensive, after tests) ─────────────────
  build:
    name: Build Package
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make build
      - name: Check package
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v5
        with:
          name: dist-ci
          path: dist/

  docker:
    name: Docker (${{ matrix.platform }})
    needs: [test]
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: cd docs-site && npm ci
      - run: make docs-check

  # ── Summary gate ──────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    needs: [lint, typecheck, security, dead-code, complexity, cognitive-complexity, file-length, refurb, dep-check, docstring-coverage, arch-check, duplication, critique, test, test-extras, build, docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.typecheck.result }}"
            "${{ needs.security.result }}"
            "${{ needs.dead-code.result }}"
            "${{ needs.complexity.result }}"
            "${{ needs.cognitive-complexity.result }}"
            "${{ needs.file-length.result }}"
            "${{ needs.refurb.result }}"
            "${{ needs.dep-check.result }}"
            "${{ needs.docstring-coverage.result }}"
            "${{ needs.arch-check.result }}"
            "${{ needs.duplication.result }}"
            "${{ needs.critique.result }}"
            "${{ needs.test.result }}"
            "${{ needs.test-extras.result }}"
            "${{ needs.build.result }}"
            "${{ needs.docs.result }}"
          )
          for r in "${results[@]}"; do
            [[ "$r" != "success" ]] && echo "A job failed: $r" && exit 1
          done
          echo "All jobs passed!"
