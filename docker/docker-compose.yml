# Immich Memories - Docker Compose Configuration
# Run alongside your Immich instance

version: "3.8"

services:
  immich-memories:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: immich-memories
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Config directory (for persistent settings)
      - immich-memories-config:/home/immich/.immich-memories

      # Output directory for generated videos
      - ./output:/app/output

      # Optional: Mount a local directory for music files
      # - ./music:/app/music:ro
    environment:
      # Immich connection (can also be set in config.yaml)
      - IMMICH_URL=${IMMICH_URL:-}
      - IMMICH_API_KEY=${IMMICH_API_KEY:-}

      # Session secret (auto-generated if not set, but set this for multi-replica/K8s)
      - IMMICH_MEMORIES_STORAGE_SECRET=${IMMICH_MEMORIES_STORAGE_SECRET:-}

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=2G
      - /home/immich/.cache:size=1G
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"

    networks:
      - immich-memories-net
    # Uncomment to connect to Immich's network
    # external_links:
    #   - immich_server:immich

  # Optional: Add to existing Immich network
  # networks:
  #   default:
  #     external:
  #       name: immich_default

volumes:
  immich-memories-config:

networks:
  immich-memories-net:
    driver: bridge

