# Mirror to private repo → triggers GPU integration tests → status callback
#
# SECURITY: Self-hosted GPU runners can't safely run on public repos (fork abuse).
# This workflow mirrors code to a private repo where ARC GPU runners are scoped.
#
# Triggers:
#   - push to main: automatic (post-merge integration regression check)
#   - workflow_dispatch: manual (test a specific branch before merging)
#
# NEVER add pull_request trigger — any fork could push malicious code
# (crypto miners, exfiltration) to the GPU runner. PRs only get unit tests
# on GitHub-hosted runners.
#
# Flow:
#   1. Push branch to private mirror (SSH deploy key)
#   2. Trigger integration workflow via repository_dispatch
#   3. Post "pending" commit status on this repo
#   4. Private repo runs FFmpeg + GPU tests on ARC K8s runner
#   5. Private repo posts "success"/"failure" status back here

name: Mirror to CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test (defaults to current)"
        required: false
        type: string

permissions:
  contents: read
  statuses: write

jobs:
  mirror:
    name: Mirror & Trigger GPU Tests
    runs-on: ubuntu-latest
    if: github.repository == 'sam-dumont/immich-video-memory-generator'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || github.sha }}
      - name: Create LFS cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
      - name: Cache LFS objects
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-
      - name: Pull LFS files
        run: git lfs pull

      - name: Push to private mirror
        env:
          SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/mirror_key
          chmod 600 ~/.ssh/mirror_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/mirror_key -o IdentitiesOnly=yes"
          git remote add mirror git@github.com:sam-dumont/immich-memories-ci.git
          # Always push main first (integration.yml must exist on default branch
          # for repository_dispatch to find the workflow)
          git fetch origin main
          git push mirror --force "origin/main:refs/heads/main"
          # Then push the target branch
          git push mirror --force "HEAD:refs/heads/${BRANCH}"
          git push mirror --force --tags 2>/dev/null || true
          # WHY: git push doesn't auto-push LFS to non-origin remotes.
          # Without this, LFS pointers land but blobs are missing = CI fails.
          git lfs push mirror --all 2>/dev/null || true
          rm -f ~/.ssh/mirror_key

      - name: Set pending status
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.CI_MIRROR_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{
              "state": "pending",
              "context": "Integration (GPU)",
              "description": "Waiting for GPU runner...",
              "target_url": "https://github.com/sam-dumont/immich-memories-ci/actions"
            }'

      - name: Trigger integration tests
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.CI_MIRROR_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/sam-dumont/immich-memories-ci/dispatches" \
            -d '{
              "event_type": "integration-test",
              "client_payload": {
                "sha": "${{ github.sha }}",
                "branch": "${{ inputs.branch || github.ref_name }}",
                "public_repo": "${{ github.repository }}"
              }
            }'
