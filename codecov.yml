comment: false

codecov:
  # WHY: Integration coverage XMLs (tests/*-coverage.xml) are generated locally
  # and committed — their timestamps are stale. CI freshens them before upload,
  # but this disables the server-side check as a safety net.
  max_report_age: off

# WHY: Without flag definitions, Codecov auto-creates flags but doesn't
# carry them forward — so a commit touching only unit tests would show 0%
# integration coverage instead of keeping the last known value.
flags:
  unittests:
    paths:
      - src/immich_memories/
    carryforward: true
  integration:
    paths:
      - src/immich_memories/
    carryforward: true
  integration-linux:
    paths:
      - src/immich_memories/
    carryforward: true

coverage:
  status:
    # WHY: Codecov only sees CI unit tests, not integration coverage XMLs.
    # Real enforcement is via `make diff-cover-ci` which merges all XMLs.
    # Codecov stays informational — uploads for tracking, no blocking.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
