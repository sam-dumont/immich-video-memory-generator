name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: 'false'
        type: boolean
      force_version:
        description: 'Force version bump type (optional)'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  # Validate commit messages follow conventional commits
  commitlint:
    name: Lint Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Validate commit messages
        run: |
          # Check all commits in the PR
          uvx --from commitizen cz check --rev-range origin/${{ github.base_ref }}..HEAD

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make dev

      - name: Run ruff check
        run: make lint

      - name: Run ruff format check
        run: make format-check

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make dev

      # --- SAST ---
      - name: Bandit (Python security linter)
        run: uvx bandit -r src/ --severity-level medium -f json -o bandit-report.json || true

      - name: Check Bandit results
        run: |
          HIGH=$(python3 -c "import json; r=json.load(open('bandit-report.json')); print(sum(1 for i in r['results'] if i['issue_severity']=='HIGH'))")
          echo "Bandit HIGH severity findings: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            python3 -c "import json; r=json.load(open('bandit-report.json')); [print(f\"  {i['filename']}:{i['line_number']} [{i['test_id']}] {i['issue_text']}\") for i in r['results'] if i['issue_severity']=='HIGH']"
            echo "::warning::Bandit found $HIGH HIGH severity findings - review bandit-report.json"
          fi

      - name: Semgrep (cross-file SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true  # Don't fail CI if Semgrep token not configured

      # --- Dead code & complexity ---
      - name: Vulture (dead code detection)
        run: make dead-code

      - name: Xenon (complexity gate)
        run: make complexity

      - name: File length gate (max 500 lines)
        run: make file-length

      # --- Dependency & supply chain ---
      - name: pip-audit (dependency vulnerabilities)
        run: uvx pip-audit -r <(uv pip freeze | grep -v -e '^-e ' -e '^immich-memories==') --strict
        shell: bash

      # --- Secret detection ---
      - name: Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Container security ---
      - name: Hadolint (Dockerfile linting)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: error

      - name: Upload Bandit report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make dev

      - name: Run mypy
        run: make typecheck

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install dependencies
        run: make dev

      - name: Run tests
        run: make test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Test optional extras install and run on Python 3.13
  test-extras:
    name: Test Extras (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extras: "dev,face,audio,audio-ml,gpu"
          - os: macos-latest
            extras: "dev,mac,audio,audio-ml,face,gpu"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install "3.13"

      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install dependencies with extras
        run: |
          IFS=',' read -ra EXTRAS <<< "${{ matrix.extras }}"
          ARGS=""
          for extra in "${EXTRAS[@]}"; do
            ARGS="$ARGS --extra $extra"
          done
          uv sync $ARGS

      - name: Run tests
        run: make test

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: make build

      - name: Show version
        run: |
          echo "Built version:"
          ls -la dist/
          # Show the version from the built package
          unzip -p dist/*.whl '*/METADATA' | grep '^Version:'

      - name: Check package
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-ci
          path: dist/

  # Build Docker image (no push) to validate Dockerfile on PRs
  docker:
    name: Build Docker Image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Validate docs build (catches broken links, missing images, syntax errors)
  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        run: cd docs-site && npm ci

      - name: Build docs
        run: make docs-check

  # Summary job that other jobs can depend on
  ci-success:
    name: CI Success
    needs: [lint, security, typecheck, test, test-extras, build, docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.test-extras.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.docs.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed!"

  # ── Release pipeline (only on push to main or manual trigger) ──────────

  analyze:
    name: Analyze Commits & Branches
    needs: [ci-success]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.analyze.outputs.should_release }}
      next_version: ${{ steps.analyze.outputs.next_version }}
      release_type: ${{ steps.analyze.outputs.release_type }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Analyze commits and merged branches
        id: analyze
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_VERSION: ${{ inputs.force_version }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$PREV_TAG" ]]; then
            echo "No previous tag found, this will be the first release"
            PREV_VERSION="0.0.0"
            COMMIT_RANGE="HEAD"
          else
            PREV_VERSION=${PREV_TAG#v}
            COMMIT_RANGE="$PREV_TAG..HEAD"
          fi
          echo "Previous version: $PREV_VERSION"

          RELEASE_TYPE="none"

          echo "Checking merged branches..."
          if [[ -n "$PREV_TAG" ]]; then
            MERGED_BRANCHES=$(git log $COMMIT_RANGE --merges --pretty=format:"%s" 2>/dev/null || echo "")
          else
            MERGED_BRANCHES=$(git log --merges --pretty=format:"%s" 2>/dev/null || echo "")
          fi

          echo "Merged branches:"
          echo "$MERGED_BRANCHES"

          if echo "$MERGED_BRANCHES" | grep -qiE "(breaking/|major/)"; then
            echo "Found breaking/major branch merge"
            RELEASE_TYPE="major"
          elif echo "$MERGED_BRANCHES" | grep -qiE "(feat/|feature/|minor/)"; then
            echo "Found feature/minor branch merge"
            if [[ "$RELEASE_TYPE" != "major" ]]; then
              RELEASE_TYPE="minor"
            fi
          elif echo "$MERGED_BRANCHES" | grep -qiE "(fix/|bugfix/|patch/|hotfix/)"; then
            echo "Found fix/patch branch merge"
            if [[ "$RELEASE_TYPE" == "none" ]]; then
              RELEASE_TYPE="patch"
            fi
          fi

          if [[ -n "$PREV_TAG" ]]; then
            COMMITS=$(git log $COMMIT_RANGE --pretty=format:"%s" 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"%s" 2>/dev/null || echo "")
          fi

          if echo "$COMMITS" | grep -qE "^feat(\(.+\))?!:|BREAKING CHANGE"; then
            RELEASE_TYPE="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            if [[ "$RELEASE_TYPE" != "major" ]]; then
              RELEASE_TYPE="minor"
            fi
          elif echo "$COMMITS" | grep -qE "^(fix|perf)(\(.+\))?:"; then
            if [[ "$RELEASE_TYPE" == "none" ]]; then
              RELEASE_TYPE="patch"
            fi
          fi

          if [[ "$FORCE_VERSION" != "" && "$FORCE_VERSION" != "auto" ]]; then
            echo "Forcing version bump: $FORCE_VERSION"
            RELEASE_TYPE="$FORCE_VERSION"
          fi

          echo "Determined release type: $RELEASE_TYPE"

          if [[ "$RELEASE_TYPE" == "none" ]]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No releasable changes found"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT

            IFS='.' read -r MAJOR MINOR PATCH <<< "$PREV_VERSION"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}

            case "$RELEASE_TYPE" in
              major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEXT_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
              patch) NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac

            echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
            echo "Next version: $NEXT_VERSION"
          fi

  release:
    name: Create Release
    needs: [analyze]
    if: needs.analyze.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.analyze.outputs.release_type == 'major' && 'production-major' || 'production' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Create tag and release
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_VERSION: ${{ needs.analyze.outputs.next_version }}
        run: |
          git tag -a "v$NEXT_VERSION" -m "Release v$NEXT_VERSION"
          git push origin "v$NEXT_VERSION"

      - name: Build package
        run: uv build

      - name: Show built version
        run: |
          echo "Built packages:"
          ls -la dist/
          unzip -p dist/*.whl '*/METADATA' | grep '^Version:'

      - name: Generate changelog
        id: changelog
        env:
          NEXT_VERSION: ${{ needs.analyze.outputs.next_version }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "### Features" >> release_notes.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^feat" >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### Bug Fixes" >> release_notes.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^fix" >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### Other Changes" >> release_notes.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^feat" --grep="^fix" --invert-grep >> release_notes.md || true

            echo "" >> release_notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...v$NEXT_VERSION" >> release_notes.md
          else
            echo "### Initial Release" >> release_notes.md
            git log --pretty=format:"- %s (%h)" >> release_notes.md || true
            echo "" >> release_notes.md
          fi

      - name: Create GitHub Release
        if: inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.analyze.outputs.next_version }}
          name: v${{ needs.analyze.outputs.next_version }}
          body_path: release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-release
          path: dist/

      - name: Summary
        if: inputs.dry_run != 'true'
        env:
          NEXT_VERSION: ${{ needs.analyze.outputs.next_version }}
        run: |
          echo "## Release v$NEXT_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published packages:" >> $GITHUB_STEP_SUMMARY
          ls -la dist/ >> $GITHUB_STEP_SUMMARY

      - name: Dry run summary
        if: inputs.dry_run == 'true'
        run: |
          echo "## Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Would release version: **v${{ needs.analyze.outputs.next_version }}**" >> $GITHUB_STEP_SUMMARY
          echo "Release type: **${{ needs.analyze.outputs.release_type }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built packages:" >> $GITHUB_STEP_SUMMARY
          ls -la dist/ >> $GITHUB_STEP_SUMMARY

  pypi-publish:
    name: Publish to PyPI
    needs: [analyze, release]
    if: inputs.dry_run != 'true' && needs.analyze.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/immich-memories/
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-release
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy-docs:
    name: Deploy Docs
    needs: [analyze, release]
    if: inputs.dry_run != 'true' && needs.analyze.outputs.should_release == 'true'
    uses: ./.github/workflows/docs.yml
    with:
      version: v${{ needs.analyze.outputs.next_version }}
    permissions:
      contents: read
      pages: write
      id-token: write

  docker-build:
    name: Build & Push Docker (${{ matrix.platform }})
    needs: [analyze, release]
    if: inputs.dry_run != 'true' && needs.analyze.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            slug: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            slug: arm64

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.slug }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v5
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Create Docker Manifest
    needs: [analyze, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ needs.analyze.outputs.next_version }}
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            $(printf "$IMAGE@sha256:%s " *)
