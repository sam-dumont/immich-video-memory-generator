# GPU Integration Tests — runs on self-hosted K8s runner with FFmpeg + GPU
#
# Trigger manually via "Run workflow" button or gh CLI:
#   gh workflow run integration.yml -f suite=all
#   gh workflow run integration.yml -f suite=assembly
#
# Security model (public repo + self-hosted runner):
#   - workflow_dispatch ONLY — forks cannot trigger this workflow
#   - No pull_request / pull_request_target triggers — NEVER add them
#   - github.repository check — belt + suspenders against fork execution
#   - ARC runner scoped to this repo only (not org-level)
#   See: https://docs.github.com/en/actions/concepts/runners/self-hosted-runners
#
# Soft-fail: continue-on-error so partial results are still useful.

name: Integration Tests (GPU)

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - assembly
          - photos
          - pipeline
          - live-photos
          - cli
      timeout:
        description: "Timeout in minutes (cli suite needs ~20)"
        required: false
        default: "30"
        type: string

permissions:
  contents: write  # To push updated coverage XMLs

# Only run on the real repo, never on forks
# (forks can't trigger workflow_dispatch anyway, but belt + suspenders)
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  integration:
    name: "${{ inputs.suite }} suite"
    runs-on: [self-hosted, gpu]
    if: github.repository == 'sam-dumont/immich-video-memory-generator'
    timeout-minutes: ${{ fromJSON(inputs.timeout) }}
    continue-on-error: true  # Soft-fail — don't block anything

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          ref: ${{ github.ref }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev

      - name: Verify FFmpeg + zscale
        run: |
          ffmpeg -version | head -3
          ffmpeg -filters 2>&1 | grep -q zscale && echo "zscale: OK" || echo "WARNING: zscale not available"

      - name: Verify GPU
        run: |
          if command -v nvidia-smi &>/dev/null; then
            nvidia-smi --query-gpu=name,memory.total --format=csv,noheader
          elif command -v system_profiler &>/dev/null; then
            system_profiler SPDisplaysDataType | grep -A2 "Chipset Model"
          else
            echo "No GPU detection available"
          fi

      - name: Run integration tests
        run: |
          case "${{ inputs.suite }}" in
            all)       make test-integration ;;
            assembly)  make test-integration-assembly ;;
            photos)    make test-integration-photos ;;
            pipeline)  make test-integration-pipeline ;;
            live-photos) make test-integration-live-photos ;;
            cli)       make test-integration-cli ;;
          esac

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: integration-coverage-${{ inputs.suite }}
          path: tests/*-coverage.xml
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: tests/assembly-coverage.xml,tests/photos-coverage.xml,tests/pipeline-coverage.xml,tests/live-photos-coverage.xml,tests/auth-coverage.xml
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Commit updated coverage XMLs
        if: always() && inputs.suite == 'all'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet tests/*-coverage.xml 2>/dev/null; then
            echo "No coverage changes to commit"
          else
            git add tests/*-coverage.xml
            git commit -m "ci: refresh integration coverage XMLs from GPU runner"
            git push
          fi
