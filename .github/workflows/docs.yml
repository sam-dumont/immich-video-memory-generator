name: Deploy Docs

on:
  # Deploy only on releases (not every push to main)
  release:
    types: [published]
  # Allow manual deploys
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: cd docs-site && npm ci

      - name: Inject version from release tag
        run: |
          # Use release tag if available, otherwise git describe
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          fi
          echo "DOCS_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Building docs for version: ${VERSION}"

          # Set version in docusaurus config via env var
          # (customFields.version is available in React components)
          cd docs-site
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '${VERSION}'.replace(/^v/, '');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build site
        run: cd docs-site && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
