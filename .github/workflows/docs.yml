name: Deploy Docs

on:
  # Deploy only on releases (not every push to main)
  release:
    types: [published]
  # Called from release pipeline (GITHUB_TOKEN events don't trigger other workflows)
  workflow_call:
    inputs:
      version:
        description: 'Version tag to inject into docs (e.g. v1.2.3)'
        required: false
        type: string
  # Allow manual deploys
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docs-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    if: github.repository == 'sam-dumont/immich-video-memory-generator'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Create LFS cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
      - name: Cache LFS objects
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-
      - name: Pull LFS files
        run: git lfs pull

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: cd docs-site && npm ci

      - name: Inject version from release tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Use workflow_call input, release tag, or git describe
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$EVENT_NAME" == "release" ]]; then
            VERSION="$RELEASE_TAG"
          else
            VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          fi
          echo "DOCS_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Building docs for version: ${VERSION}"

          # Set version in docusaurus config via env var
          # (customFields.version is available in React components)
          # Set version in package.json safely via env var
          cd docs-site
          export DOCS_VERSION_CLEAN="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = process.env.DOCS_VERSION_CLEAN;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build site
        run: cd docs-site && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs-site/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
