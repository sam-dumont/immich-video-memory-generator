name: Update Changelog

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  update-changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest
    # Skip if the last commit is already a changelog update (prevent loops)
    if: >-
      !startsWith(github.event.pull_request.title, 'chore(release)')
      && !contains(github.event.head_commit.message || '', 'chore(changelog)')
    steps:
      - uses: actions/checkout@v5
        with:
          # Check out the PR branch (not the merge ref) so we can push back
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$PREV_TAG" ]]; then
            PREV_VERSION="0.0.0"
            COMMIT_RANGE="HEAD"
          else
            PREV_VERSION=${PREV_TAG#v}
            COMMIT_RANGE="$PREV_TAG..HEAD"
          fi

          RELEASE_TYPE="none"

          # Check merged branch names
          if [[ -n "$PREV_TAG" ]]; then
            MERGED_BRANCHES=$(git log $COMMIT_RANGE --merges --pretty=format:"%s" 2>/dev/null || echo "")
          else
            MERGED_BRANCHES=$(git log --merges --pretty=format:"%s" 2>/dev/null || echo "")
          fi

          if echo "$MERGED_BRANCHES" | grep -qiE "(breaking/|major/)"; then
            RELEASE_TYPE="major"
          elif echo "$MERGED_BRANCHES" | grep -qiE "(feat/|feature/|minor/)"; then
            RELEASE_TYPE="minor"
          elif echo "$MERGED_BRANCHES" | grep -qiE "(fix/|bugfix/|patch/|hotfix/)"; then
            RELEASE_TYPE="patch"
          fi

          # Check commit messages (conventional commits)
          if [[ -n "$PREV_TAG" ]]; then
            COMMITS=$(git log $COMMIT_RANGE --pretty=format:"%s" 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"%s" 2>/dev/null || echo "")
          fi

          if echo "$COMMITS" | grep -qE "^feat(\(.+\))?!:|BREAKING CHANGE"; then
            RELEASE_TYPE="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            if [[ "$RELEASE_TYPE" != "major" ]]; then
              RELEASE_TYPE="minor"
            fi
          elif echo "$COMMITS" | grep -qE "^(fix|perf)(\(.+\))?:"; then
            if [[ "$RELEASE_TYPE" == "none" ]]; then
              RELEASE_TYPE="patch"
            fi
          fi

          if [[ "$RELEASE_TYPE" == "none" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No releasable changes found, skipping changelog update"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$PREV_VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          case "$RELEASE_TYPE" in
            major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEXT_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION (type: $RELEASE_TYPE)"

      - name: Generate release notes
        if: steps.version.outputs.skip != 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
        run: |
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "### Features" >> release_notes.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^feat" >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### Bug Fixes" >> release_notes.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^fix" >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### Other Changes" >> release_notes.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^feat" --grep="^fix" --invert-grep >> release_notes.md || true
            echo "" >> release_notes.md
          else
            echo "### Initial Release" >> release_notes.md
            git log --pretty=format:"- %s (%h)" >> release_notes.md || true
            echo "" >> release_notes.md
          fi

      - name: Update CHANGELOG.md
        if: steps.version.outputs.skip != 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          DATE=$(date +%Y-%m-%d)

          # Build the new version section
          {
            echo "## [${NEXT_VERSION}] - ${DATE}"
            echo ""
            sed -e 's/^### Features$/### Added/' \
                -e 's/^### Bug Fixes$/### Fixed/' \
                -e 's/^### Other Changes$/### Changed/' \
                -e '/^## /d' \
                -e '/^$/N;/^\n$/d' \
                release_notes.md
            echo ""
          } > new_section.md

          python3 <<'PYEOF'
          import re
          from pathlib import Path
          import os

          version = os.environ["NEXT_VERSION"]
          new_section = Path("new_section.md").read_text()
          changelog = Path("CHANGELOG.md").read_text()
          repo = "${{ github.repository }}"

          # Insert new version after [Unreleased]
          unreleased_pattern = r'(## \[Unreleased\]\n)'
          changelog = re.sub(
              unreleased_pattern,
              r'\1\n' + new_section,
              changelog,
              count=1,
          )

          # Clear [Unreleased] section content (keep heading)
          changelog = re.sub(
              r'(## \[Unreleased\])\n([\s\S]*?)\n(## \[' + re.escape(version) + r'\])',
              r'\1\n\n\3',
              changelog,
              count=1,
          )

          # Update [Unreleased] comparison link
          changelog = re.sub(
              r'\[Unreleased\]: .+',
              f'[Unreleased]: https://github.com/{repo}/compare/v{version}...HEAD',
              changelog,
          )

          # Add new version comparison link
          prev_tag_match = re.search(r'\[[\d.]+\]: .+/releases/tag/(v[\d.]+)', changelog)
          prev_tag = prev_tag_match.group(1) if prev_tag_match else None

          if prev_tag:
              version_link = f'[{version}]: https://github.com/{repo}/compare/{prev_tag}...v{version}'
          else:
              version_link = f'[{version}]: https://github.com/{repo}/releases/tag/v{version}'

          changelog = re.sub(
              r'(\[Unreleased\]: .+\n)',
              r'\1' + version_link + '\n',
              changelog,
          )

          Path("CHANGELOG.md").write_text(changelog)
          PYEOF

          rm -f new_section.md release_notes.md

      - name: Commit and push if changed
        if: steps.version.outputs.skip != 'true'
        run: |
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
          else
            git commit -m "chore(changelog): update for projected v${NEXT_VERSION} [skip ci]"
            git push
          fi
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
