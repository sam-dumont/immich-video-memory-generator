name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `immich-memories generate ...`
        2. ...
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - pip
        - Docker
        - Kubernetes
        - From source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `immich-memories --version`
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs (use `--log-level DEBUG` for verbose output)
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, FFmpeg version, GPU (if applicable)
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.13
        - FFmpeg: 7.0
        - GPU: NVIDIA RTX 3080
