apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-memories
  namespace: immich-memories
  labels:
    app.kubernetes.io/name: immich-memories
    app.kubernetes.io/component: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-memories
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-memories
    spec:
      # Required for NVIDIA GPU support
      runtimeClassName: nvidia

      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: immich-memories
          image: ghcr.io/sam-dumont/immich-video-memory-generator:latest
          imagePullPolicy: Always

          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # NiceGUI needs write access
            capabilities:
              drop:
                - ALL

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: IMMICH_URL
              valueFrom:
                secretKeyRef:
                  name: immich-memories-secrets
                  key: IMMICH_URL
            - name: IMMICH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: immich-memories-secrets
                  key: IMMICH_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: immich-memories-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: PIXABAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: immich-memories-secrets
                  key: PIXABAY_API_KEY
                  optional: true
            # Content analysis settings (can override via env vars)
            - name: IMMICH_MEMORIES_CONTENT_ANALYSIS__ENABLED
              value: "false"
            - name: IMMICH_MEMORIES_CONTENT_ANALYSIS__OLLAMA_URL
              value: "http://ollama.ollama.svc.cluster.local:11434"
            # Analysis settings
            - name: IMMICH_MEMORIES_ANALYSIS__USE_SCENE_DETECTION
              value: "true"
            # NVIDIA GPU environment variables
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,video,utility"
            # Set HOME for non-root user
            - name: HOME
              value: "/home/appuser"

          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
              # Request NVIDIA GPU
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4000m"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: config
              mountPath: /home/appuser/.immich-memories
              readOnly: true
            - name: output
              mountPath: /output
            - name: cache
              mountPath: /home/appuser/.cache/immich-memories
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: config
          configMap:
            name: immich-memories-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: output
          persistentVolumeClaim:
            claimName: immich-memories-output
        - name: cache
          persistentVolumeClaim:
            claimName: immich-memories-cache
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi

      # Node selector for GPU nodes
      nodeSelector:
        nvidia.com/gpu.present: "true"

      # Tolerate GPU taints if your cluster uses them
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
