name: CI

on:
  push:
    branches: [main]  # Codecov needs coverage on main to compare PRs against
  pull_request:
    branches: [main]
  workflow_call:  # Allow this workflow to be called from release.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# =============================================================================
# Job ordering: cheap → expensive. All quality gates run in parallel.
# Tests and Docker only run after quality gates pass.
# =============================================================================

jobs:
  # ── Tier 0: Cache setup (shared by all jobs) ──────────────────────────────
  setup:
    name: Setup Cache
    runs-on: ubuntu-latest
    if: github.repository == 'sam-dumont/immich-video-memory-generator'
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci

  # ── Tier 1: Cheap quality gates (all parallel, ~10s each) ─────────────────
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.repository == 'sam-dumont/immich-video-memory-generator' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: COMMIT_RANGE="origin/${{ github.base_ref }}..HEAD" make commitlint

  lint:
    name: Lint + Format
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - name: Ruff check
        run: make lint
      - name: Ruff format check
        run: make format-check

  typecheck:
    name: Type Check (mypy)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make typecheck

  dead-code:
    name: Dead Code (Vulture)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make dead-code

  complexity:
    name: Cyclomatic Complexity (Xenon)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make complexity

  cognitive-complexity:
    name: Cognitive Complexity
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make cognitive-complexity

  file-length:
    name: File Length (≤800 lines)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make file-length

  refurb:
    name: Modernization (refurb)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make refurb

  dep-check:
    name: Dependency Hygiene (deptry)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make dep-check

  arch-check:
    name: Architecture (import-linter)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make arch-check

  duplication:
    name: Code Duplication (≤5%)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: make duplication

  critique:
    name: AI Smell Audit
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci
      - run: make critique

  # ── Tier 1: Security (parallel with quality gates) ────────────────────────
  security:
    name: Security Scan
    needs: [setup]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make dev-ci

      - name: Bandit (Python SAST)
        run: make bandit-ci

      - name: Semgrep (cross-file SAST)
        if: env.SEMGREP_APP_TOKEN != ''
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/python p/owasp-top-ten p/security-audit"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Semgrep (local, no token)
        if: env.SEMGREP_APP_TOKEN == ''
        run: make semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: pip-audit (dependency CVEs)
        run: make pip-audit

      - name: Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: error

      - name: Upload Bandit report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Tier 2: Tests (after all quality gates pass) ──────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: [lint, typecheck, security, dead-code, complexity, cognitive-complexity, file-length, refurb, dep-check, arch-check, duplication, critique]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for diff-cover

      # WHY: LFS bandwidth is metered — caching avoids re-downloading 13MB of
      # fixtures on every CI run (~9 LFS checkouts/push was burning 1GB/month).
      - name: Create LFS cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-
      - name: Pull LFS files
        run: git lfs pull

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
      - run: uv python install ${{ matrix.python-version }}

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - run: make dev-test

      - name: Run tests with coverage
        run: make test-cov-xml

      - name: Diff coverage (≥80% on changed lines)
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          make diff-cover-ci

      - name: Freshen integration coverage timestamps
        # WHY: tests/*-coverage.xml are committed from local integration runs.
        # Codecov rejects reports >12h old regardless of max_report_age setting.
        # Rewrite timestamps to "now" before upload. Uses python for portability.
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: |
          python3 -c "
          import glob, re, time, pathlib
          now = str(int(time.time() * 1000))
          for f in glob.glob('tests/*-coverage.xml'):
              p = pathlib.Path(f)
              txt = p.read_text()
              p.write_text(re.sub(r'timestamp=\"[0-9]+\"', f'timestamp=\"{now}\"', txt))
              print(f'  freshened {f}')
          "

      - name: Upload unit test coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        with:
          files: coverage.xml
          flags: unittests
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        with:
          files: tests/assembly-coverage.xml,tests/audio-coverage.xml,tests/auth-coverage.xml,tests/cli-coverage.xml,tests/live-photos-coverage.xml,tests/photos-coverage.xml,tests/pipeline-coverage.xml
          flags: integration
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() && matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest' }}
        with:
          files: junit.xml,tests/integration-junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          fail_ci_if_error: false

  test-extras:
    name: Test Extras (${{ matrix.os }})
    needs: [lint, typecheck, security, dead-code, complexity, cognitive-complexity, file-length, refurb, dep-check, arch-check, duplication, critique]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extras: "dev,face,audio,audio-ml,gpu"
          - os: macos-latest
            extras: "dev,mac,audio,audio-ml,face,gpu"
    steps:
      - uses: actions/checkout@v5
      - name: Create LFS cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-
      - name: Pull LFS files
        run: git lfs pull
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false
          cache-suffix: extras
      - run: uv python install "3.13"

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install with extras
        run: |
          IFS=',' read -ra EXTRAS <<< "${{ matrix.extras }}"
          ARGS=""
          for extra in "${EXTRAS[@]}"; do
            ARGS="$ARGS --extra $extra"
          done
          uv sync $ARGS

      - run: make test

  # Integration tests run LOCALLY via pre-commit hook (not in CI — too slow).
  # Triggered by changes to src/immich_memories/(processing|titles)/ or tests/integration/.
  # Run manually: make test-integration

  # ── Tier 3: Build + Docker (most expensive, after tests) ─────────────────
  build:
    name: Build Package
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: make build
      - name: Check package
        run: make build-check
      - uses: actions/upload-artifact@v5
        with:
          name: dist-ci
          path: dist/

  docker:
    name: Docker (${{ matrix.platform }})
    needs: [test]
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create LFS cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-
      - name: Pull LFS files
        run: git lfs pull
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: cd docs-site && npm ci
      - run: make docs-check

  # ── Summary gate ──────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    needs: [lint, typecheck, security, dead-code, complexity, cognitive-complexity, file-length, refurb, dep-check, arch-check, duplication, critique, test, test-extras, build, docker, docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.typecheck.result }}"
            "${{ needs.security.result }}"
            "${{ needs.dead-code.result }}"
            "${{ needs.complexity.result }}"
            "${{ needs.cognitive-complexity.result }}"
            "${{ needs.file-length.result }}"
            "${{ needs.refurb.result }}"
            "${{ needs.dep-check.result }}"
            "${{ needs.arch-check.result }}"
            "${{ needs.duplication.result }}"
            "${{ needs.critique.result }}"
            "${{ needs.test.result }}"
            "${{ needs.test-extras.result }}"
            "${{ needs.build.result }}"
            "${{ needs.docker.result }}"
            "${{ needs.docs.result }}"
          )
          for r in "${results[@]}"; do
            # Allow "success", "skipped" (conditional jobs), and "cancelled" (concurrency group)
            [[ "$r" != "success" && "$r" != "skipped" && "$r" != "cancelled" ]] && echo "A job failed: $r" && exit 1
          done
          echo "All jobs passed!"
