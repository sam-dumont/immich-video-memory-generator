repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-pyyaml
          - pydantic
          - pydantic-settings
        args: [--ignore-missing-imports]
        pass_filenames: false
        entry: mypy src/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen

  - repo: local
    hooks:
      - id: file-length
        name: File length gate (max 500 lines)
        entry: make file-length
        language: system
        pass_filenames: false
        types: [python]

      - id: complexity
        name: Complexity gate (Xenon grade C)
        entry: make complexity
        language: system
        pass_filenames: false
        types: [python]
