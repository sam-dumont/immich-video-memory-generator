# GPU Integration Tests — triggered by public repo mirror
#
# This is a PRIVATE mirror of sam-dumont/immich-video-memory-generator.
# Self-hosted runners are safe here.
#
# Flow: public repo pushes branch + dispatches → we run tests → post status back

name: Integration (GPU)

on:
  repository_dispatch:
    types: [integration-test]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - assembly
          - titles
          - photos
          - pipeline
          - live-photos
          - cli

permissions:
  contents: read

concurrency:
  group: integration-${{ github.event.client_payload.branch || github.ref_name }}
  cancel-in-progress: true

env:
  # WHY: Coverage XMLs are generated locally on Python 3.12. Using the same
  # version here ensures line numbers match — Python 3.13's bytecode compiler
  # reports different coverable lines, causing Codecov merge mismatches.
  PYTHON_VERSION: "3.12"
  # PVC mounted at /home/runner/.cache/uv by ARC (see rancher-cluster/55-github-arc)
  UV_CACHE_DIR: /home/runner/.cache/uv
  UV_LINK_MODE: copy

jobs:
  integration:
    name: "GPU Tests"
    runs-on: gpu
    # Only runs on the private mirror — never on the public repo
    if: github.repository == 'sam-dumont/immich-memories-ci'
    timeout-minutes: 90
    steps:
      - name: Resolve params
        id: params
        run: |
          # repository_dispatch vs workflow_dispatch
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "sha=${{ github.event.client_payload.sha }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.client_payload.branch }}" >> "$GITHUB_OUTPUT"
            echo "public_repo=${{ github.event.client_payload.public_repo }}" >> "$GITHUB_OUTPUT"
            echo "suite=all" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "public_repo=sam-dumont/immich-video-memory-generator" >> "$GITHUB_OUTPUT"
            echo "suite=${{ inputs.suite || 'all' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-lfs ffmpeg make build-essential cmake pkg-config

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.params.outputs.branch }}
      - name: Create LFS cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
      - name: Cache LFS objects
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-
      - name: Pull LFS files
        run: git lfs pull

      - name: Post "in_progress" status
        if: github.event_name == 'repository_dispatch'
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.PUBLIC_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ steps.params.outputs.public_repo }}/statuses/${{ steps.params.outputs.sha }}" \
            -d '{
              "state": "pending",
              "context": "Integration (GPU)",
              "description": "Running FFmpeg + GPU tests...",
              "target_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Pin Python version for uv
        run: echo "${{ env.PYTHON_VERSION }}" > .python-version
      - run: make dev

      - name: Restore config
        env:
          CONFIG_B64: ${{ secrets.IMMICH_MEMORIES_CONFIG }}
        run: |
          mkdir -p /tmp/runner-home/.immich-memories
          echo "$CONFIG_B64" | base64 -d > /tmp/runner-home/.immich-memories/config.yaml
          chmod 600 /tmp/runner-home/.immich-memories/config.yaml
          # Override paths via env vars (pydantic-settings: IMMICH_MEMORIES_ prefix, __ nesting)
          echo "HOME=/tmp/runner-home" >> "$GITHUB_ENV"
          # WHY: cache on PVC so analysis results persist between CI runs.
          # Placed inside the uv cache mount (the only PVC on ARC runners).
          CACHE_DIR="/home/runner/.cache/uv/immich-memories"
          mkdir -p "$CACHE_DIR"
          echo "IMMICH_MEMORIES_CACHE__DIRECTORY=$CACHE_DIR" >> "$GITHUB_ENV"
          echo "IMMICH_MEMORIES_CACHE__DATABASE=$CACHE_DIR/cache.db" >> "$GITHUB_ENV"
          echo "IMMICH_MEMORIES_OUTPUT__DIRECTORY=/tmp/immich-output" >> "$GITHUB_ENV"
          # Disable external music services — we test the mixing pipeline, not the APIs
          echo "MUSICGEN_ENABLED=false" >> "$GITHUB_ENV"
          echo "ACE_STEP_ENABLED=false" >> "$GITHUB_ENV"

      - name: Environment info
        run: |
          echo "=== FFmpeg ==="
          ffmpeg -version | head -3
          ffmpeg -filters 2>&1 | grep -q zscale && echo "zscale: OK" || echo "zscale: MISSING"
          echo "=== GPU ==="
          nvidia-smi --query-gpu=name,memory.total --format=csv,noheader 2>/dev/null || echo "No NVIDIA GPU"

      - name: Run integration tests
        id: tests
        run: |
          SUITE="${{ steps.params.outputs.suite }}"
          case "$SUITE" in
            all)         make test-integration ;;
            assembly)    make test-integration-assembly ;;
            titles)      make test-integration-titles ;;
            photos)      make test-integration-photos ;;
            pipeline)    make test-integration-pipeline ;;
            live-photos) make test-integration-live-photos ;;
            cli)         make test-integration-cli ;;
          esac

      - name: Run GPU benchmarks
        if: always() && steps.tests.outcome == 'success'
        run: |
          make benchmark-assembly || true
          make benchmark-titles-json || true

      - name: Submit GPU benchmark results
        if: always() && steps.tests.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          python3 -c "
          import json, glob, sys
          merged = []
          for f in sorted(glob.glob('tests/benchmark-*.json')):
              try:
                  merged.extend(json.loads(open(f).read()))
              except Exception as e:
                  print(f'WARN: skipping {f}: {e}', file=sys.stderr)
          if not merged:
              print('No benchmark results found', file=sys.stderr)
              sys.exit(0)
          open('benchmark-results.json', 'w').write(json.dumps(merged, indent=2))
          print(f'Merged {len(merged)} entries into benchmark-results.json')
          " || true
          if [ -f benchmark-results.json ]; then
            SHA="${{ steps.params.outputs.sha }}"
            # WHY: pipe JSON via stdin (--input) to avoid exceeding shell ARG_MAX
            # when benchmark results are large.
            jq -n \
              --arg ref "main" \
              --arg runner "gpu-arc" \
              --arg suite "all" \
              --arg sha "$SHA" \
              --rawfile results benchmark-results.json \
              '{ref: $ref, inputs: {runner: $runner, suite: $suite, sha: $sha, results: $results}}' \
            | gh api repos/${{ steps.params.outputs.public_repo }}/actions/workflows/benchmark.yml/dispatches \
              --method POST --input - || echo "WARN: benchmark submit failed"
          fi

      - name: Normalize coverage paths and freshen timestamps
        # WHY: Codecov rejects reports >12h old, and source paths must match
        # across all uploads for proper merging. Normalize to relative paths.
        if: always()
        run: |
          python3 -c "
          import glob, re, time, pathlib
          now = str(int(time.time() * 1000))
          for f in glob.glob('tests/*-coverage.xml'):
              p = pathlib.Path(f)
              if not p.exists():
                  continue
              txt = p.read_text()
              txt = re.sub(r'<source>.*/src/immich_memories</source>', '<source>src/immich_memories</source>', txt)
              txt = re.sub(r'timestamp=\"[0-9]+\"', f'timestamp=\"{now}\"', txt)
              p.write_text(txt)
              print(f'  normalized {f}')
          "

      - name: Upload coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        if: always()
        with:
          files: tests/assembly-coverage.xml,tests/audio-coverage.xml,tests/auth-coverage.xml,tests/automation-coverage.xml,tests/cli-coverage.xml,tests/e2e-coverage.xml,tests/live-photos-coverage.xml,tests/photos-coverage.xml,tests/pipeline-coverage.xml,tests/processing-coverage.xml,tests/titles-coverage.xml
          flags: integration-linux
          disable_search: true
          override_commit: ${{ steps.params.outputs.sha }}
          override_branch: ${{ steps.params.outputs.branch }}
          slug: ${{ steps.params.outputs.public_repo }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Post success status
        if: success() && github.event_name == 'repository_dispatch'
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.PUBLIC_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ steps.params.outputs.public_repo }}/statuses/${{ steps.params.outputs.sha }}" \
            -d '{
              "state": "success",
              "context": "Integration (GPU)",
              "description": "All GPU tests passed",
              "target_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Post failure status
        if: failure() && github.event_name == 'repository_dispatch'
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.PUBLIC_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ steps.params.outputs.public_repo }}/statuses/${{ steps.params.outputs.sha }}" \
            -d '{
              "state": "failure",
              "context": "Integration (GPU)",
              "description": "GPU tests failed — click for details",
              "target_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
